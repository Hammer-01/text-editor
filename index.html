<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Editor</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="main">
      <textarea id="text-box" placeholder="Enter text here" autocomplete="off" autofocus></textarea>
        <div id="tools">
          Character&nbsp;count:&nbsp;<span id="char-count">0</span><span class="separator"></span>
          Word&nbsp;count:&nbsp;<span id="word-count">0</span><span class="separator"></span>
          Line&nbsp;count:&nbsp;<span id="line-count">0</span>
        </div>
        <button id="share-button">Share</button>
    </div>
  </body>
  <script src="texteditor.js"></script>
</html>
